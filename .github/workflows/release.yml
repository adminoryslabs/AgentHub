name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
          - platform: macos-latest
            args: ''
          - platform: ubuntu-22.04
            args: ''

    runs-on: ${{ matrix.platform }}

    defaults:
      run:
        working-directory: dev-control-center

    steps:
      - uses: actions/checkout@v4

      - name: Instalar dependencias del sistema (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Instalar Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './dev-control-center/src-tauri -> target'

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dev-control-center/package-lock.json

      - name: Instalar dependencias Node
        run: npm install

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: dev-control-center
          tagName: ${{ github.ref_name }}
          releaseName: 'Dev Control Center ${{ github.ref_name }}'
          releaseBody: 'Nueva versión de Dev Control Center'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
